<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Source Air & Energy Ltd</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f9fc;color:#16324f}
header{background:#0b2c52;color:white;padding:40px;text-align:center}
.trust-strip{padding:50px 20px;background:white}
.container{max-width:1200px;margin:auto}
.trust-items{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.trust-item{background:white;border:1px solid #dfe6ee;border-radius:18px;padding:20px;
display:flex;align-items:center;justify-content:center;min-height:120px;box-shadow:0 8px 20px rgba(0,0,0,.05)}
.trust-item img{max-width:150px;max-height:70px}
@media(max-width:800px){.trust-items{grid-template-columns:1fr 1fr}}
@media(max-width:500px){.trust-items{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h1>One Source Air & Energy Ltd</h1>
<p>Domestic Energy & Home Services</p>
</header>

<section class="trust-strip">
<div class="container">
<h2>Accreditations</h2>
<div class="trust-items">
<div class="trust-item"><img src="assets/logos/gas-safe-register.png" alt="Gas Safe"></div>
<div class="trust-item"><img src="assets/logos/niceic-approved-contractor.png" alt="NICEIC"></div>
<div class="trust-item"><img src="assets/logos/refcom.png" alt="REFCOM"></div>
<div class="trust-item"><img src="assets/logos/mcs-certified.png" alt="MCS"></div>
</div>
</div>
</section>

</body>
</html>
