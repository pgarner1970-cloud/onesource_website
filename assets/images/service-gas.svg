<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-label="Domestic boiler installation">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dceaf7"/>
      <stop offset="1" stop-color="#e7eef6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#071f3d" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="900" height="560" fill="url(#sky)"/>
  
<rect width="900" height="560" fill="#eadfd2"/>
<rect x="130" y="70" width="640" height="420" rx="20" fill="#fff" filter="url(#shadow)"/>
<rect x="265" y="115" width="370" height="290" rx="18" fill="#f8fafc" stroke="#d8e0e8" stroke-width="6"/>
<rect x="315" y="170" width="270" height="90" rx="10" fill="#e6edf4"/>
<circle cx="375" cy="320" r="24" fill="#10233f"/>
<circle cx="525" cy="320" r="24" fill="#10233f"/>
<rect x="390" y="455" width="28" height="105" fill="#c8a66f"/>
<rect x="482" y="455" width="28" height="105" fill="#c8a66f"/>
<text x="450" y="225" font-family="Arial" font-size="34" font-weight="700" text-anchor="middle" fill="#10233f">BOILER</text>

</svg>